name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"   # Запускается каждый день в полночь
  workflow_dispatch:      # Позволяет запустить вручную
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Generate Snake GIF
        uses: Platane/snk@v3
        with:
          github_user_name: Valls123
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=00ff99&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
      
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
